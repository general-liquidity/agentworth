name: Release

# Automated, token-based publishing for every package in the repo, so a release
# never needs a manual `npm publish` + interactive 2FA again.
#
# SAFE BY DEFAULT: each job is gated on a repository VARIABLE (Settings → Variables),
# so with nothing configured this workflow publishes NOTHING. Opt each registry in:
#   - npm:      set var PUBLISH_NPM=true     + secret NPM_TOKEN     (npm Automation token)
#   - PyPI:     set var PUBLISH_PYPI=true    + secret PYPI_API_TOKEN
#   - crates:   set var PUBLISH_CRATES=true  + secret CARGO_REGISTRY_TOKEN
# Then push a tag (e.g. `v0.1.1`) or run this workflow manually.
#
# Versions are read from each package's own manifest — bump them, tag, done.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance + (optional) PyPI trusted publishing

jobs:
  npm:
    name: npm (opensolvency + opensolvency-mcp)
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      # prepublishOnly builds dist; publishConfig.access=public; provenance attests
      # the build came from this repo+commit (supply-chain signal, on brand).
      - name: Publish @general-liquidity/opensolvency
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish @general-liquidity/opensolvency-mcp
        working-directory: opensolvency-mcp
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  pypi:
    name: PyPI (opensolvency)
    if: ${{ vars.PUBLISH_PYPI == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        working-directory: clients/python
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist
          password: ${{ secrets.PYPI_API_TOKEN }}

  crates:
    name: crates.io (opensolvency)
    if: ${{ vars.PUBLISH_CRATES == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build + test before publishing
        working-directory: clients/rust
        run: cargo test --quiet
      - name: Publish to crates.io
        working-directory: clients/rust
        run: cargo publish --token "${CARGO_REGISTRY_TOKEN}"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
